name: Test/build on feature branch push

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.gitHooks/**'
      - '.gitignore'
      - '.idea/**'
      - '.nais/alerts.yml'
      - 'clean_lint_and_build.sh'
      - 'CODEOWNERS'
      - 'doc/**'
      - 'docker-compose/**'
      - 'docs/**'
      - 'LICENSE'
      - 'lint_and_build.sh'

jobs:
  build:
    name: Test and build
    uses: ./.github/workflows/.test-and-build.yml
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      id-token: write
    with:
      buildImage: false
    secrets:
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}